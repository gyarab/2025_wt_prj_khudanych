# Cílové servery pro nasazení JEF. Verzovaný (commitnutý) inventář —
# uživatele i host si tu uprav, AŽ DOSTANEŠ PŘÍSTUPY. Tajný je jen SSH klíč
# (GitHub secret SSH_PRIVATE_KEY), kterým se na server přihlásíme.
#
#   ansible_host  – doménové jméno / IP serveru   (vzor učitele: gawt.dtcloud.cz)
#   ansible_user  – SSH uživatel (musí mít právo používat docker)
#   project_dir   – kam se na serveru rozbalí zdroják a postaví stack
[web]
gawt ansible_host=gawt.dtcloud.cz ansible_user=khudanych project_dir=/home/khudanych/jef
