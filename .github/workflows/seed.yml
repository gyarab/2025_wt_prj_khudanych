# Naplnění databáze JEF ukázkovými daty z fixtures/ — SAMOSTATNÝ, jen ruční workflow.
#
# POZOR: napřed databázi VYPRÁZDNÍ (flush) a pak nahraje fixture (loaddata). Proto je
# oddělený od deploye a chce potvrzení. Předpokládá, že stack už běží (deploy proběhl).
#
# Spuštění: Actions -> Seed database -> Run workflow -> do pole „confirm" napiš SEED.
# Nebo přes CLI:  gh workflow run "Seed database" -f confirm=SEED
#
# Tajemství i přístup jsou stejné jako u deploye (SSH klíč v secretu SSH_PRIVATE_KEY).
name: Seed database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Smaže a znovu naplní databázi. Pro potvrzení napiš SEED."
        type: string
        default: ""

# Sdílená skupina s deployem, ať seed a deploy neběží proti serveru naráz.
concurrency:
  group: deploy-jef
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    env:
      ANSIBLE_PRIVATE_KEY_FILE: ${{ github.workspace }}/.ssh-deploy-key
    steps:
      - name: Check confirmation
        if: ${{ inputs.confirm != 'SEED' }}
        run: |
          echo "::error::Potvrzení neodpovídá. Spusť znovu a do pole 'confirm' napiš SEED."
          exit 1

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible + docker collection
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<2.19"
          ansible-galaxy collection install community.docker

      - name: Write SSH private key from secret
        run: |
          install -m 600 /dev/null "$ANSIBLE_PRIVATE_KEY_FILE"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$ANSIBLE_PRIVATE_KEY_FILE"

      - name: Seed database (flush + loaddata)
        run: ansible-playbook playbooks/seed.yml
