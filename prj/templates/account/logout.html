{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Sign Out" %}{% endblock %}

{% block content %}
<div class="container my-5 animate-fade-in text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg p-4">
                <i class="bi bi-box-arrow-right text-danger mb-3" style="font-size: 3rem;"></i>
                <h3 class="fw-bold">{% trans "Sign Out" %}</h3>
                <p class="text-muted">{% trans 'Are you sure you want to sign out?' %}</p>
                
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                    {% endif %}
                    <div class="d-grid gap-2">
                        <button class="btn btn-danger py-2" type="submit">{% trans 'Sign Out' %}</button>
                        <a href="{% url 'homepage' %}" class="btn btn-light">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
