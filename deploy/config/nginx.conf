# Vstupní brána JEF. Mountuje se do frontend kontejneru jako
# /etc/nginx/conf.d/default.conf (viz docker-compose.yml).

upstream django {
    server web:8000;          # název služby z docker-compose + interní port gunicornu
}

# Respektuj schéma od případné nadřazené proxy (traefik), jinak použij vlastní.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 25m;

    # Vue SPA (build s base=/app/). try_files dělá fallback na index.html kvůli
    # client-side routování (history mode) – přímé otevření /app/... funguje.
    location /app/ {
        alias /usr/share/nginx/vue/;
        try_files $uri $uri/ /app/index.html;
    }

    # Statika Djanga (admin + app) – collectstatic ji plní do sdíleného volume.
    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Média (zatím prázdné – vlajky jsou externí URL z flagcdn.com, ale cesta je připravená).
    location /media/ {
        alias /srv/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /healthcheck {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Zbytek (rozcestník `/`, /flags, /admin, /api, /playground, …) jde na Django.
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
