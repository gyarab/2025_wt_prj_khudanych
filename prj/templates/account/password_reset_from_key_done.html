{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Change Password" %}{% endblock %}

{% block content %}
<div class="container my-5 animate-fade-in">
    <div class="row justify-content-center px-3">
        <div class="col-md-8 col-lg-5">
            <div class="card border-0 shadow-lg text-center">
                <div class="card-body p-5">
                    <i class="bi bi-shield-check text-success mb-3" style="font-size: 2.5rem;"></i>
                    <h3 class="fw-bold mb-3">{% trans "Change Password" %}</h3>
                    <p class="text-muted mb-0">{% trans "Your password is now changed." %}</p>
                </div>
                <div class="card-footer bg-light py-3 border-0">
                    <a href="{% url 'account_login' %}" class="text-decoration-none fw-semibold">{% trans "Sign In" %}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
