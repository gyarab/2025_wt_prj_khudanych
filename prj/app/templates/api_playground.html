<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>JEF - API Playground</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 40px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input { padding: 10px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px; width: 150px; text-transform: uppercase; }
        button { padding: 10px 15px; background: #007acc; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0062a3; }
        #result { margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; display: none; }
        .error { color: #ff6b6b; margin-top: 10px; }
        img { max-width: 200px; border-radius: 4px; border: 1px solid #444; block-size: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>JEF API Playground</h2>
        <p>Zadej třípísmenný kód státu (např. CZE, SVK, JPN):</p>
        
        <input type="text" id="countryCode" maxlength="3" placeholder="CZE" value="CZE">
        <button id="fetchBtn">Načti vlajku</button>

        <div id="errorBox" class="error"></div>

        <div id="result">
            <h3 id="countryName"></h3>
            <p><strong>Hlavní město:</strong> <span id="countryCapital"></span></p>
            <p><strong>Skóre hodnocení:</strong> <span id="countryScore"></span></p>
            <img id="countryFlag" src="" alt="Vlajka">
        </div>
    </div>

    <script>
        document.getElementById('fetchBtn').addEventListener('click', function() {
            const code = document.getElementById('countryCode').value.trim().toUpperCase();
            const errorBox = document.getElementById('errorBox');
            const resultDiv = document.getElementById('result');

            // Reset předchozích stavů
            errorBox.innerText = '';
            resultDiv.style.display = 'none';

            if (code.length !== 3) {
                errorBox.innerText = 'Kód musí mít přesně 3 znaky!';
                return;
            }

            // Volání fetch() nevrací data, ale PROMISE (slib), že data jednou dorazí.
            fetch(`/api/countries/${code}`)
                .then(function(response) {
                    // První Promise se vyřeší (resolve) ve chvíli, kdy dorazí HTTP hlavičky ze serveru.
                    if (!response.ok) {
                        throw new Error(`Stát ${code} nebyl nalezen (HTTP ${response.status})`);
                    }
                    // Metoda .json() čte tělo (payload) a vrací DALŠÍ Promise.
                    return response.json();
                })
                .then(function(data) {
                    // Sem kód doputuje, až když se data kompletně stáhnou a přeparsují do JS objektu.
                    document.getElementById('countryName').innerText = data.name_official;
                    document.getElementById('countryCapital').innerText = data.capital || '—';
                    document.getElementById('countryScore').innerText = data.score;
                    document.getElementById('countryFlag').src = data.flag_svg;
                    
                    resultDiv.style.display = 'block';
                })
                .catch(function(error) {
                    errorBox.innerText = error.message;
                });
        });
    </script>
</body>
</html>
