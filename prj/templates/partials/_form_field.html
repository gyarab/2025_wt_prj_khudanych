<div class="mb-3">
    {% if field.field.widget.input_type == "checkbox" %}
        <div class="form-check">
            {{ field }}
            <label class="form-check-label ms-2" for="{{ field.id_for_label }}">
                {{ field.label }}
            </label>
        </div>
    {% else %}
        <label for="{{ field.id_for_label }}" class="form-label small text-uppercase fw-bold text-muted mb-1">{{ field.label }}</label>
        {{ field }}
    {% endif %}

    {% if field.help_text and field.field.widget.input_type != "password" %}
        <div class="form-text small text-muted">{{ field.help_text|safe }}</div>
    {% endif %}

    {% for error in field.errors %}
        <div class="text-danger small mt-1">
            <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
        </div>
    {% endfor %}
</div>

<style>
    /* Ensure inputs get form-control class even if not set in widget */
    #{{ field.id_for_label }}:not([type="checkbox"]):not([type="radio"]) {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #2d3748;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #e2e8f0;
        appearance: none;
        border-radius: 10px;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    #{{ field.id_for_label }}:focus {
        border-color: #667eea;
        outline: 0;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
</style>
